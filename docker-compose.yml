version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ./ollama_data:/root/.ollama
      - .:/app
    ports:
      - "11434:11434"
    restart: unless-stopped

  sinj-bot:
    build: .
    container_name: sinj-discord-bot
    depends_on:
      - ollama
    env_file:
      - .env
    environment:
      - OLLAMA_URL=http://ollama:11434/api/generate
    restart: unless-stopped

volumes:
  ollama_data:
